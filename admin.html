<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Betplay IGAC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300..700&display=swap" rel="stylesheet">
<style>
:root{--fd:'Bebas Neue',Impact,sans-serif;--fb:'Inter',system-ui,sans-serif;--ease:180ms cubic-bezier(.16,1,.3,1);}
[data-theme="dark"]{--bg:#090b13;--sf:#101220;--sf2:#151828;--sf3:#1b1f32;--bd:rgba(255,255,255,.07);--bdb:rgba(255,255,255,.14);--tx:#e5e7f0;--txm:#727690;--txf:#42465e;--gold:#f0c040;--gdim:rgba(240,192,64,.14);--gglow:rgba(240,192,64,.28);--green:#22c55e;--gdim2:rgba(34,197,94,.12);--red:#ef4444;--rdim:rgba(239,68,68,.12);--blue:#4d87ff;--bdim:rgba(77,135,255,.12);--sh:0 8px 32px rgba(0,0,0,.45);}
[data-theme="light"]{--bg:#eef0f8;--sf:#fff;--sf2:#f6f7fc;--sf3:#eceef8;--bd:rgba(0,0,0,.07);--bdb:rgba(0,0,0,.14);--tx:#0e1120;--txm:#58607e;--txf:#9298b8;--gold:#b87800;--gdim:rgba(184,120,0,.1);--gglow:rgba(184,120,0,.22);--green:#15803d;--gdim2:rgba(21,128,61,.1);--red:#dc2626;--rdim:rgba(220,38,38,.1);--blue:#1a50d0;--bdim:rgba(26,80,208,.08);--sh:0 4px 16px rgba(0,0,0,.1);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{min-height:100dvh;font-family:var(--fb);font-size:1rem;color:var(--tx);background:var(--bg);}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
input[type=number]{font:inherit;color:inherit}
/* ── Header ── */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:.65rem 1.5rem;background:var(--sf);border-bottom:1px solid var(--bdb);position:sticky;top:0;z-index:100;gap:1rem;flex-wrap:wrap;}
.logo{font-family:var(--fd);font-size:1.5rem;letter-spacing:.06em;color:var(--gold);line-height:1;}
.admin-badge{display:inline-block;background:var(--rdim);color:var(--red);font-family:var(--fb);font-size:.65rem;font-weight:800;letter-spacing:.12em;padding:1px 7px;border-radius:4px;margin-left:.4rem;vertical-align:middle;border:1px solid rgba(239,68,68,.3);}
.logo-sub{font-size:.72rem;color:var(--txm);margin-top:2px;}
.hdr-r{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;}
.fb-status{display:flex;align-items:center;gap:.4rem;font-size:.72rem;color:var(--txm);padding:.25rem .75rem;border-radius:9999px;background:var(--sf2);border:1px solid var(--bd);}
.fb-dot{width:7px;height:7px;border-radius:50%;background:var(--txf);flex-shrink:0;}
.fb-dot.ok{background:var(--green);box-shadow:0 0 5px var(--green);}
.fb-dot.err{background:var(--red);}
.fb-dot.sync{background:var(--gold);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes spin{to{transform:rotate(360deg)}}
.reload-btn{padding:.3rem .9rem;border-radius:9999px;border:1px solid var(--bd);background:var(--sf2);color:var(--txm);font-size:.75rem;font-weight:600;transition:all var(--ease);}
.reload-btn:hover{color:var(--tx);border-color:var(--bdb);}
.theme-btn{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--sf2);border:1px solid var(--bd);color:var(--txm);transition:all var(--ease);}
.theme-btn:hover{color:var(--gold);border-color:var(--gold);}
/* ── Phase nav ── */
.phase-nav{display:flex;gap:.4rem;padding:.6rem 1.5rem;background:var(--sf);border-bottom:1px solid var(--bd);overflow-x:auto;scrollbar-width:none;}
.phase-nav::-webkit-scrollbar{display:none}
.ptab{padding:.35rem .95rem;border-radius:9999px;font-size:.82rem;font-weight:500;color:var(--txm);border:1px solid var(--bd);background:transparent;white-space:nowrap;transition:all var(--ease);}
.ptab:hover:not(:disabled){color:var(--tx);background:var(--sf2);}
.ptab.on{color:var(--gold);background:var(--gdim);border-color:rgba(240,192,64,.3);}
.ptab:disabled{opacity:.3;cursor:default;}
/* ── Main ── */
.main{padding:1.25rem 1.5rem;max-width:1400px;margin:0 auto;}
/* ── Info bar ── */
.info-bar{display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:.65rem;align-items:center;}
.legend-item{font-size:.7rem;padding:2px 9px;border-radius:9999px;font-weight:700;border:1px solid;}
.li-exact{background:var(--gdim2);color:var(--green);border-color:rgba(34,197,94,.3);}
.li-winner{background:var(--bdim);color:var(--blue);border-color:rgba(77,135,255,.25);}
.li-wrong{background:var(--rdim);color:var(--red);border-color:rgba(239,68,68,.25);}
.li-pending{background:var(--sf3);color:var(--txm);border-color:var(--bd);}
.perspective-note{font-size:.72rem;color:var(--txm);background:var(--sf2);border:1px solid var(--bd);border-left:3px solid var(--gold);border-radius:0 .5rem .5rem 0;padding:.4rem .85rem;margin-bottom:.9rem;line-height:1.5;}
.perspective-note strong{color:var(--gold);}
/* ── Table ── */
.table-scroll{overflow-x:auto;border-radius:.75rem;border:1px solid var(--bd);}
.admin-table{border-collapse:collapse;width:100%;min-width:860px;}
.admin-table th{background:var(--sf2);padding:.55rem 1rem;font-size:.68rem;font-weight:700;color:var(--txm);letter-spacing:.07em;text-transform:uppercase;border-bottom:2px solid var(--bdb);white-space:nowrap;text-align:left;}
.admin-table th.p-col{text-align:center;}
.admin-table td{padding:.45rem .75rem;border-top:1px solid var(--bd);vertical-align:middle;}
.admin-table tr:hover td{background:rgba(255,255,255,.015);}
/* Match cell */
.match-cell{background:var(--sf2);border-right:1px solid var(--bdb) !important;vertical-align:middle !important;min-width:200px;max-width:220px;}
.match-inner{display:flex;flex-direction:column;gap:.35rem;}
.team-row{display:flex;align-items:center;gap:.4rem;}
.crest{width:18px;height:18px;object-fit:contain;flex-shrink:0;border-radius:3px;}
.team-name{font-size:.78rem;font-weight:600;color:var(--tx);}
.team-name.away{color:var(--txm);font-weight:500;}
/* Leg cell */
.leg-cell{border-right:1px solid var(--bd) !important;min-width:135px;background:var(--sf);}
.leg-inner{display:flex;flex-direction:column;gap:2px;}
.leg-badge{display:inline-block;font-size:.62rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:1px 6px;border-radius:3px;}
.leg-badge.ida{background:var(--gdim);color:var(--gold);border:1px solid rgba(240,192,64,.25);}
.leg-badge.vuelta{background:var(--bdim);color:var(--blue);border:1px solid rgba(77,135,255,.2);}
.leg-host{font-size:.67rem;color:var(--txf);margin-top:1px;}
/* VUELTA row slightly different bg */
.vuelta-row td{background:rgba(0,0,0,.04);}
[data-theme="light"] .vuelta-row td{background:rgba(0,0,0,.02);}
/* Score cell */
.score-td{text-align:center;}
.score-cell{display:inline-flex;align-items:center;gap:.25rem;padding:3px 5px;border-radius:.35rem;transition:background var(--ease);}
.score-cell.st-exact{background:var(--gdim2);}
.score-cell.st-winner{background:var(--bdim);}
.score-cell.st-wrong{background:var(--rdim);}
.sinput{width:32px;text-align:center;background:var(--sf2);border:1px solid var(--bd);border-radius:.3rem;padding:2px 3px;font-size:.82rem;font-weight:600;color:var(--tx);transition:border-color var(--ease);-moz-appearance:textfield;}
.sinput:focus{outline:none;border-color:var(--gold);background:var(--sf3);}
.sinput::-webkit-outer-spin-button,.sinput::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.sep{color:var(--txf);font-weight:700;font-size:.82rem;user-select:none;}
/* Real result cell */
.real-col{border-left:2px solid var(--bdb) !important;white-space:nowrap;}
.real-score{font-family:'Courier New',monospace;font-weight:700;font-size:.88rem;color:var(--green);}
.real-pend{font-size:.72rem;color:var(--txf);}
/* Points per participant */
.pts-row td{background:var(--sf2);border-top:2px solid var(--bdb) !important;font-size:.75rem;padding:.5rem .75rem;}
.pts-pill{display:inline-block;padding:2px 8px;border-radius:9999px;font-weight:700;font-size:.75rem;}
.pts-pill.has{background:var(--gdim2);color:var(--green);}
.pts-pill.zero{background:var(--sf3);color:var(--txm);}
/* Action bar */
.action-bar{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:1rem;align-items:center;padding:.85rem 1.1rem;background:var(--sf);border:1px solid var(--bd);border-radius:.75rem;}
.action-label{font-size:.75rem;color:var(--txm);font-weight:600;margin-right:.25rem;}
.save-p-btn{padding:.38rem 1rem;background:var(--sf2);border:1px solid var(--bd);border-radius:.4rem;color:var(--txm);font-size:.8rem;font-weight:600;transition:all var(--ease);}
.save-p-btn:hover{color:var(--tx);border-color:var(--bdb);background:var(--sf3);}
.save-all-btn{margin-left:auto;padding:.42rem 1.5rem;background:var(--gdim);border:1px solid rgba(240,192,64,.3);border-radius:.4rem;color:var(--gold);font-size:.85rem;font-weight:700;transition:all var(--ease);}
.save-all-btn:hover{background:var(--gglow);box-shadow:0 0 14px var(--gglow);}
/* Empty state */
.empty{color:var(--txm);text-align:center;padding:3rem;font-size:.9rem;}
/* Toast */
.toast{position:fixed;bottom:1.75rem;left:50%;transform:translateX(-50%);background:var(--sf);border:1px solid var(--bdb);border-radius:9999px;padding:.55rem 1.5rem;font-size:.875rem;font-weight:600;box-shadow:var(--sh);z-index:999;opacity:0;pointer-events:none;transition:opacity .3s;white-space:nowrap;}
.toast.show{opacity:1;}
/* Loading overlay */
.fb-loading{position:fixed;inset:0;background:rgba(9,11,19,.93);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;z-index:9999;backdrop-filter:blur(8px);}
.fb-loading.hidden{display:none;}
.spinner{width:44px;height:44px;border:3px solid var(--sf3);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
.ld-t{font-family:var(--fd);font-size:1.3rem;letter-spacing:.07em;color:var(--gold);}
.ld-s{font-size:.85rem;color:var(--txm);}
@media(max-width:640px){.main,.phase-nav,.hdr{padding-left:.85rem;padding-right:.85rem;}.admin-table{min-width:700px;}}
/* ── Login gate ── */
.login-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:10000;}
.login-overlay.hidden{display:none;}
.login-box{background:var(--sf);border:1px solid var(--bdb);border-radius:1rem;padding:2.5rem 2rem;width:340px;max-width:90vw;display:flex;flex-direction:column;gap:1rem;box-shadow:var(--sh);}
.login-logo{font-family:var(--fd);font-size:2rem;letter-spacing:.07em;color:var(--gold);text-align:center;line-height:1;}
.login-sub{font-size:.78rem;color:var(--txm);text-align:center;margin-top:.15rem;}
.login-label{font-size:.75rem;font-weight:700;color:var(--txm);letter-spacing:.06em;text-transform:uppercase;}
.login-input{width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:.45rem;padding:.55rem .85rem;font-size:.95rem;color:var(--tx);transition:border-color var(--ease);}
.login-input:focus{outline:none;border-color:var(--gold);}
.login-btn{width:100%;padding:.6rem;background:var(--gdim);border:1px solid rgba(240,192,64,.3);border-radius:.45rem;color:var(--gold);font-weight:700;font-size:.95rem;transition:all var(--ease);cursor:pointer;}
.login-btn:hover{background:var(--gglow);box-shadow:0 0 14px var(--gglow);}
.login-err{font-size:.78rem;color:var(--red);text-align:center;min-height:1.1rem;}
</style>
</head>
<body>

<!-- Login gate -->
<div class="login-overlay" id="login-overlay">
  <div class="login-box">
    <div class="login-logo">BETPLAY IGAC</div>
    <div class="login-sub">Panel Admin &mdash; UCL 25/26</div>
    <div>
      <div class="login-label">Contraseña</div>
      <input type="password" class="login-input" id="login-input" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="login-btn" id="login-btn">Entrar</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- Loading overlay -->
<div class="fb-loading" id="fb-loading">
  <div class="spinner"></div>
  <div class="ld-t">ADMIN — BETPLAY IGAC</div>
  <div class="ld-s" id="ld-msg">Conectando con Firebase...</div>
</div>

<div class="toast" id="toast"></div>

<!-- Header -->
<header class="hdr">
  <div>
    <div class="logo">BETPLAY IGAC<span class="admin-badge">ADMIN</span></div>
    <div class="logo-sub">Panel de edición de pronósticos · UCL 25/26</div>
  </div>
  <div class="hdr-r">
    <button class="reload-btn" id="reload-btn">🔄 Recargar pronósticos</button>
    <button class="theme-btn" id="theme-btn" title="Cambiar tema">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    <div class="fb-status" id="fb-status"><div class="fb-dot" id="fb-dot"></div><span id="fb-label">Conectando...</span></div>
  </div>
</header>

<!-- Phase tabs -->
<nav class="phase-nav" id="phase-nav"></nav>

<!-- Main content (table injected here) -->
<div id="main-content"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import{getFirestore,doc,setDoc,getDoc,onSnapshot}from"https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

/* ── Config ── */
const cfg={apiKey:"AIzaSyCKX5Fg_QvDSrNtk-aQMXif40mybHUCUTs",authDomain:"betplay-igac.firebaseapp.com",projectId:"betplay-igac",storageBucket:"betplay-igac.firebasestorage.app",messagingSenderId:"435504980019",appId:"1:435504980019:web:e0d8cca815a690f3b38346"};
const db=getFirestore(initializeApp(cfg));

/* ── Constants ── */
const PARTICIPANTS=['Fabián','Karen','Yohn','Michael'];
const PHASES=[
  {id:'oct', name:'Octavos',  date:'4–12 Mar 2026'},
  {id:'qtr', name:'Cuartos',  date:'7–15 Abr 2026'},
  {id:'semi',name:'Semis',    date:'28 Abr – 6 May 2026'},
  {id:'final',name:'Final',   date:'30 May 2026 · Budapest'},
];

/* ── State ── */
let MATCHES=[];
let results={};
let pron={};       // local editable state (not auto-updated from Firebase)
let activePhase='oct';

/* ── Firebase status ── */
function setFb(s){
  const dot=document.getElementById('fb-dot');
  const lbl=document.getElementById('fb-label');
  dot.className='fb-dot';
  if(s==='ok')  {dot.classList.add('ok');   lbl.textContent='En línea';}
  else if(s==='sync'){dot.classList.add('sync'); lbl.textContent='Guardando...';}
  else          {dot.classList.add('err');  lbl.textContent='Sin conexión';}
}

/* ── Load pron data from Firebase (explicit, not reactive) ── */
async function loadProns(){
  for(const p of PARTICIPANTS){
    try{
      const snap=await getDoc(doc(db,'betplay','pron_'+p));
      pron[p]=snap.exists()?JSON.parse(snap.data().data):{};
    }catch(e){pron[p]={};}
  }
}

/* ── Capture DOM inputs into pron state (before tab switch or save) ── */
function captureInputs(){
  MATCHES.filter(m=>m.phase===activePhase&&!m.tbd).forEach(m=>{
    const legs=m.oneleg?['ida']:['ida','vuelta'];
    legs.forEach(leg=>{
      PARTICIPANTS.forEach(p=>{
        const h=document.getElementById(`a-${p}-${m.id}-${leg}-h`);
        const a=document.getElementById(`a-${p}-${m.id}-${leg}-a`);
        if(h&&a){
          if(!pron[p])pron[p]={};
          if(!pron[p][m.id])pron[p][m.id]={ida:{home:null,away:null},vuelta:{home:null,away:null}};
          pron[p][m.id][leg]={
            home: h.value!==''?parseInt(h.value):null,
            away: a.value!==''?parseInt(a.value):null,
          };
        }
      });
    });
  });
}

/* ── Save one participant to Firebase ── */
async function saveParticipant(p){
  captureInputs();
  setFb('sync');
  try{
    await setDoc(doc(db,'betplay','pron_'+p),{
      data:JSON.stringify(pron[p]||{}),
      updated_at: new Date().toISOString(),
    });
    setFb('ok');
    toast(`✅ ${p} guardado en Firebase`);
  }catch(e){setFb('err');toast('❌ Error: '+e.message);}
}

/* ── Save all participants ── */
async function saveAll(){
  captureInputs();
  setFb('sync');
  try{
    for(const p of PARTICIPANTS){
      await setDoc(doc(db,'betplay','pron_'+p),{
        data:JSON.stringify(pron[p]||{}),
        updated_at: new Date().toISOString(),
      });
    }
    setFb('ok');
    toast('✅ Todos los pronósticos guardados en Firebase');
  }catch(e){setFb('err');toast('❌ Error: '+e.message);}
}

/* ── Reload prons from Firebase ── */
async function reloadProns(){
  toast('🔄 Recargando pronósticos...');
  await loadProns();
  render();
  toast('✅ Datos recargados desde Firebase');
}

/* ── Score evaluation ── */
const winner=s=>s.home>s.away?'h':s.home<s.away?'a':'d';
function evalCell(mid,leg,p){
  const real=results[mid]?.[leg];
  const pred=pron[p]?.[mid]?.[leg];
  if(!pred||pred.home===null||pred.away===null) return 'none';
  if(!real||real.home===null) return 'pending';
  if(real.home===pred.home&&real.away===pred.away) return 'exact';
  if(winner(real)===winner(pred)) return 'winner';
  return 'wrong';
}
const evalClass={none:'',pending:'',exact:'st-exact',winner:'st-winner',wrong:'st-wrong'};

/* ── Points calculation ── */
function calcPts(mid,p){
  const m=MATCHES.find(x=>x.id===mid);
  if(!m||m.tbd) return 0;
  let pts=0;
  const ev=(real,pred)=>{
    if(!real||real.home===null||!pred||pred.home===null) return;
    if(real.home===pred.home&&real.away===pred.away){pts+=10000;}
    else if(winner(real)===winner(pred)){pts+=5000;}
  };
  ev(results[mid]?.ida, pron[p]?.[mid]?.ida);
  if(!m.oneleg) ev(results[mid]?.vuelta, pron[p]?.[mid]?.vuelta);
  return pts;
}
const totalPts=p=>MATCHES.reduce((s,m)=>s+calcPts(m.id,p),0);
const fmt=n=>new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',minimumFractionDigits:0}).format(n);

/* ── Score input cell ── */
function scoreCell(mid,leg,p){
  const pred=pron[p]?.[mid]?.[leg];
  const hv=pred?.home!=null?pred.home:'';
  const av=pred?.away!=null?pred.away:'';
  const sc=evalClass[evalCell(mid,leg,p)]||'';
  return `<td class="score-td"><div class="score-cell ${sc}"><input type="number" min="0" max="30" class="sinput" id="a-${p}-${mid}-${leg}-h" value="${hv}" placeholder="–"><span class="sep">–</span><input type="number" min="0" max="30" class="sinput" id="a-${p}-${mid}-${leg}-a" value="${av}" placeholder="–"></div></td>`;
}

/* ── Render phase tabs ── */
function renderNav(){
  document.getElementById('phase-nav').innerHTML=PHASES.map(ph=>{
    const has=MATCHES.some(m=>m.phase===ph.id);
    return`<button class="ptab ${ph.id===activePhase?'on':''}" onclick="setPhase('${ph.id}')"${has?'':' disabled'}>${ph.name}<span style="font-size:.62rem;margin-left:.3rem;color:var(--txf)">${ph.date}</span></button>`;
  }).join('');
}

/* ── Render main table ── */
function renderTable(){
  const el=document.getElementById('main-content');
  const ms=MATCHES.filter(m=>m.phase===activePhase&&!m.tbd);

  if(!ms.length){
    el.innerHTML=`<p class="empty">Sin partidos disponibles para esta fase aún</p>`;
    return;
  }

  // Determine which teams are local in IDA for this phase
  const pHeaders=PARTICIPANTS.map(p=>`<th class="p-col">${p}</th>`).join('');

  const tbody=ms.map(m=>{
    const legs=m.oneleg?['ida']:['ida','vuelta'];
    return legs.map((leg,i)=>{
      /* Who was physically at home in this leg? */
      const physHome = leg==='ida' ? m.home : m.away;
      /* Real result for this leg */
      const r=results[m.id]?.[leg];
      const realTd=r?.home!=null
        ?`<td class="real-col"><span class="real-score">${r.home} – ${r.away}</span></td>`
        :`<td class="real-col"><span class="real-pend">⏳ Pendiente</span></td>`;
      /* Leg info cell */
      const legTd=`<td class="leg-cell"><div class="leg-inner"><span class="leg-badge ${leg}">${leg==='ida'?'IDA':'VUELTA'}</span><div class="leg-host">🏟 ${physHome}</div></div></td>`;
      /* Score cells per participant */
      const pCells=PARTICIPANTS.map(p=>scoreCell(m.id,leg,p)).join('');

      if(i===0){
        /* First row of this match: include the match cell with rowspan */
        const matchTd=`<td class="match-cell" rowspan="${legs.length}">
          <div class="match-inner">
            <div class="team-row"><img src="${m.hi_url||''}" class="crest" alt="" onerror="this.style.visibility='hidden'"><span class="team-name">${m.home}</span></div>
            <div class="team-row"><img src="${m.ai_url||''}" class="crest" alt="" onerror="this.style.visibility='hidden'"><span class="team-name away">${m.away}</span></div>
          </div></td>`;
        return`<tr>${matchTd}${legTd}${pCells}${realTd}</tr>`;
      }
      return`<tr class="vuelta-row">${legTd}${pCells}${realTd}</tr>`;
    }).join('');
  }).join('');

  /* Totals row */
  const totalRow=`<tr class="pts-row">
    <td colspan="2" style="text-align:right;padding-right:1rem;color:var(--txm);font-weight:700;font-size:.72rem;letter-spacing:.05em;">TOTAL GANADO</td>
    ${PARTICIPANTS.map(p=>{const pts=totalPts(p);return`<td class="score-td"><span class="pts-pill ${pts>0?'has':'zero'}">${fmt(pts)}</span></td>`;}).join('')}
    <td class="real-col"></td>
  </tr>`;

  el.innerHTML=`
    <div class="main">
      <div class="info-bar">
        <span class="legend-item li-exact">✅ Exacto +$10.000</span>
        <span class="legend-item li-winner">🎯 Ganador +$5.000</span>
        <span class="legend-item li-wrong">❌ Error $0</span>
        <span class="legend-item li-pending">⏳ Sin resultado</span>
      </div>
      <div class="perspective-note">
        📌 <strong>Perspectiva home_first (como está en Firebase):</strong>
        Los goles siempre muestran <strong>[equipo local IDA] – [equipo visitante IDA]</strong>.
        En la fila <em>VUELTA</em>, el equipo visitante (segunda fila) fue el anfitrión físico — pero los goles siguen en el mismo orden.
      </div>
      <div class="table-scroll">
        <table class="admin-table">
          <thead>
            <tr>
              <th style="min-width:205px">Cruce</th>
              <th style="min-width:145px">Jornada / Sede</th>
              ${pHeaders}
              <th class="real-col" style="min-width:110px">Resultado Real</th>
            </tr>
          </thead>
          <tbody>${tbody}${totalRow}</tbody>
        </table>
      </div>
      <div class="action-bar">
        <span class="action-label">GUARDAR:</span>
        ${PARTICIPANTS.map(p=>`<button class="save-p-btn" onclick="saveParticipant('${p}')">💾 ${p}</button>`).join('')}
        <button class="save-all-btn" onclick="saveAll()">💾 Guardar TODOS</button>
      </div>
    </div>`;
}

/* ── Full render ── */
function render(){renderNav();renderTable();}

/* ── Phase switch ── */
window.setPhase=id=>{captureInputs();activePhase=id;render();};

/* ── Expose to window ── */
window.saveParticipant=saveParticipant;
window.saveAll=saveAll;

/* ── Toast ── */
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

/* ── Theme toggle ── */
let dark=true;
document.getElementById('theme-btn').addEventListener('click',()=>{
  dark=!dark;
  document.documentElement.setAttribute('data-theme',dark?'dark':'light');
  document.getElementById('theme-btn').innerHTML=dark
    ?'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'
    :'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
});

/* ── Reload button ── */
document.getElementById('reload-btn').addEventListener('click',reloadProns);

/* ── Subscribe to matches_meta and results (real-time) ── */
function subscribeRealtimeData(){
  onSnapshot(doc(db,'betplay','matches_meta'),snap=>{
    if(snap.exists()){
      MATCHES=JSON.parse(snap.data().data);
      MATCHES.forEach(m=>{m.tbd=m.tbd||false;m.oneleg=m.oneleg||false;});
      const order=['oct','qtr','semi','final'];
      const phases=MATCHES.map(m=>m.phase);
      activePhase=order.find(p=>phases.includes(p))||'oct';
    }
    render();
    setFb('ok');
  },()=>setFb('err'));

  onSnapshot(doc(db,'betplay','results'),snap=>{
    results=snap.exists()?JSON.parse(snap.data().data):{};
    /* Capture current inputs before re-rendering so edits aren't lost */
    captureInputs();
    render();
  },()=>{});
}

/* ── Auth gate ── */
const PWD_HASH='3308dc3eb5fd049e8c27856a306dca348c10a09180a35498651477ef3f2eff8f';
function sha256(str){
  const buf=new TextEncoder().encode(str);
  return crypto.subtle.digest('SHA-256',buf).then(b=>Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join(''));
}
async function checkLogin(){
  const val=document.getElementById('login-input').value;
  const hash=await sha256(val);
  if(hash===PWD_HASH){
    sessionStorage.setItem('admin_ok','1');
    document.getElementById('login-overlay').classList.add('hidden');
    startApp();
  }else{
    document.getElementById('login-err').textContent='Contraseña incorrecta';
    document.getElementById('login-input').value='';
    document.getElementById('login-input').focus();
  }
}
document.getElementById('login-btn').addEventListener('click',checkLogin);
document.getElementById('login-input').addEventListener('keydown',e=>{if(e.key==='Enter')checkLogin();});

/* ── Init ── */
async function startApp(){
  try{
    document.getElementById('ld-msg').textContent='Cargando pronósticos...';
    await loadProns();
    subscribeRealtimeData();
    setTimeout(()=>document.getElementById('fb-loading').classList.add('hidden'),1800);
  }catch(e){
    document.getElementById('ld-msg').textContent='Error: '+e.message;
    setFb('err');
    setTimeout(()=>document.getElementById('fb-loading').classList.add('hidden'),3500);
  }
}

if(sessionStorage.getItem('admin_ok')==='1'){
  document.getElementById('login-overlay').classList.add('hidden');
  startApp();
}else{
  document.getElementById('fb-loading').classList.add('hidden');
  document.getElementById('login-input').focus();
}
</script>
